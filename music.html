<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Die with Smile - Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .music-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .album-art span {
            font-size: 80px;
        }

        .song-info {
            color: white;
            margin-bottom: 30px;
        }

        .song-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .song-artist {
            font-size: 18px;
            opacity: 0.9;
        }

        .player {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .volume-control {
            margin-top: 15px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .heart {
            font-size: 24px;
            margin-top: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="music-container">
        <div class="album-art">
            <span>🎵</span>
        </div>

        <div class="song-info">
            <div class="song-title">Die with Smile</div>
            <div class="song-artist">Lady Gaga & Bruno Mars</div>
        </div>

        <div class="player">
            <audio id="audioPlayer" controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <div class="volume-control">
                <label for="volume" style="color: white; font-size: 14px;">Volume:</label>
                <input type="range" id="volume" min="0" max="100" value="100">
            </div>
        </div>

        <div class="controls">
            <button onclick="document.getElementById('audioPlayer').play()">▶ Play</button>
            <button onclick="document.getElementById('audioPlayer').pause()">⏸ Pause</button>
            <button onclick="document.getElementById('audioPlayer').currentTime = 0">⏮ Reset</button>
        </div>

        <div class="heart">❤️</div>
    </div>

    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const volumeControl = document.getElementById('volume');

        volumeControl.addEventListener('input', function() {
            audioPlayer.volume = this.value / 100;
        });

        // Initialize volume
        audioPlayer.volume = volumeControl.value / 100;
    </script>
</body>
</html>
